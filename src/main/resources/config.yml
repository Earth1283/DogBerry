llm:
  # Which LLM provider to use: gemini | openrouter
  provider: "gemini"

gemini:
  # Your Gemini API key from https://aistudio.google.com
  api-key: ""
  # Additional keys tried in order when the primary key hits a quota limit
  fallback-api-keys: []
  # Order in which fallback keys are tried: sequential | random
  fallback-key-order: "sequential"
  model: "gemini-2.5-flash"
  # Maximum number of tool-call rounds per invocation before force-stopping
  max-tool-depth: 20
  # Alert in #dogberry-internal if a single invocation exceeds this cost (USD)
  cost-alert-usd: 0.10

openrouter:
  # API key from https://openrouter.ai/keys
  api-key: ""
  # Any model slug available on OpenRouter, e.g. google/gemini-2.5-flash-preview
  model: "google/gemini-2.5-flash-preview"
  max-tokens: 6000

discord:
  # Bot token from https://discord.com/developers/applications
  token: ""
  # Your Discord server (guild) ID
  guild-id: ""
  # Trigger prefix — messages starting with this string will invoke DogBerry
  # DogBerry also responds to @mentions regardless of prefix
  trigger-prefix: "!dog"
  # Map logical channel names → Discord channel IDs
  # DogBerry uses these keys internally. You must fill in all four IDs.
  channels:
    server-admin: ""        # Where admins issue commands and receive approval requests
    server-logs: ""         # Automated incident reports and unprompted posts
    dogberry-internal: ""   # DogBerry's private journal (https://i.imgur.com/qmEpf.jpg)
    plugin-releases: ""     # Announcements when new AI-written plugins are deployed

# Serper.dev API key for miniSearch tool
# Sign up at https://serper.dev — free tier available
serper:
  api-key: ""

# Domains DogBerry is allowed to fetch via miniFetch
# Adding a domain here grants DogBerry HTTP GET access to it
fetch:
  allowlist:
    - spigotmc.org
    - modrinth.com
    - papermc.io
    - docs.papermc.io
    - github.com
    - raw.githubusercontent.com
    - hub.spigotmc.org
    - repo.maven.apache.org
    - wiki.vg

# Wake timer constraints
timers:
  max-concurrent: 3
  max-duration-seconds: 21600  # 6 hours

# Path to the SQLite database file (relative to server root)
memory:
  database-path: "plugins/DogBerry/memory.db"

# Commands DogBerry is allowed to run via runSafeCommand
# Anything NOT matching a prefix here will be rejected
safe-commands:
  # When true, unlisted commands trigger an approval request in Discord
  # instead of immediately failing.
  approval-mode: false
  whitelist-prefixes:
    - "say "
    - "tell "
    - "msg "
    - "weather "
    - "time set "
    - "time add "
    - "difficulty "
    - "gamemode "
    - "give "
    - "tp "
    - "teleport "
    - "effect "
    - "enchant "
    - "xp "
    - "experience "
    - "gamerule "
    - "setworldspawn"
    - "spawnpoint "
    - "summon "
    - "list"
    - "tps"
    - "plugins"
    - "version"
    - "pl"

# Tool execution timeout
# Maximum seconds a tool call is allowed to run before returning a timeout error.
# Excludes tools that manage their own long-running timeouts (requestHumanApproval, buildPlugin, wakeMeUpIn).
tools:
  default-timeout-seconds: 30

# Settings for AI-written plugin development
dev-tools:
  # Set to false to disable writePlugin/buildPlugin/deployPlugin tools entirely
  enabled: true
  # Directory where AI-written plugin projects are staged (relative to server root)
  plugin-src-path: "plugins/src"
  # Gradle build timeout in seconds
  build-timeout-seconds: 120
  # Dev tools require a JDK (not just JRE). If javac is not found in PATH,
  # these tools will return a helpful error message instead of crashing.

# Role-based access control
# Controls which Discord users can invoke DogBerry and which tools they can use.
#
# Tool names (use these in allowed-tools lists):
#   Read-only:  getPlayerList, getServerStats, getRecentLogs, getDogberryCost,
#               getPluginList, readMem, listMem, calc
#   Moderate:   runSafeCommand, kickPlayer, miniGrep, readFile, miniSearch, miniFetch
#   Admin:      banPlayer, unbanPlayer, addToWhitelist, removeFromWhitelist,
#               writeMem, deleteMem, wakeMeUpIn, sendDiscordMessage,
#               writeFile, writePlugin, buildPlugin, deployPlugin, getGradleOutput,
#               requestHumanApproval
#
rbac:
  # Fallback tier for users whose Discord roles are not mapped below.
  # Use a tier name, "*" (all tools), or "none" (deny all).
  default-tier: "none"

  # Named tiers — define once, reference by name in roles below
  tiers:
    observer:
      allowed-tools:
        - getPlayerList
        - getServerStats
        - getRecentLogs
        - getDogberryCost
        - getPluginList
        - calc
    moderator:
      allowed-tools:
        - getPlayerList
        - getServerStats
        - getRecentLogs
        - getDogberryCost
        - getPluginList
        - calc
        - runSafeCommand
        - kickPlayer
        - readMem
        - listMem
        - miniGrep
        - miniSearch
        - miniFetch
    admin:
      allowed-tools: "*"

  # Map Discord role IDs to a tier or an inline tool list (or both — they are unioned).
  # To find a role ID: Discord → Server Settings → Roles → right-click → Copy ID
  # (requires Developer Mode enabled in Discord settings)
  roles: {}
  # Example:
  # roles:
  #   "123456789012345678":   # Admin role ID
  #     tier: admin
  #   "234567890123456789":   # Moderator role ID
  #     tier: moderator
  #   "345678901234567890":   # Custom role with specific tools
  #     tier: observer
  #     allowed-tools:
  #       - runSafeCommand

# Proactive monitoring — DogBerry watches the server and alerts Discord autonomously
monitoring:
  # Set to false to disable all proactive monitoring
  enabled: true
  # How often to check server health (in seconds)
  check-interval-seconds: 120
  # Discord channel ID to post alerts to. Leave blank to use server-admin channel.
  alert-channel: ""
  # Minimum seconds between repeated alerts of the same type (prevents spam)
  alert-cooldown-seconds: 300
  thresholds:
    # Alert when 1-minute TPS falls below these values
    tps-warning: 15.0
    tps-critical: 10.0
    # Alert when JVM memory usage exceeds these percentages
    memory-warning-percent: 80.0
    memory-critical-percent: 95.0
    # Alert when total entity count across all worlds exceeds this value
    entity-warning: 1500
    # Alert when total loaded chunk count across all worlds exceeds this value
    chunk-warning: 400
    # Alert when average milliseconds per tick exceeds this value (50ms = 20 TPS budget)
    mspt-warning: 45.0
  daily-digest:
    # Post a daily server summary embed
    enabled: true
    # Hour of day to post (0–23, server local time). 0 = midnight.
    hour: 0
    # Channel for the digest. Leave blank to use alert-channel (or server-admin).
    channel: ""
  # Forward player join/quit/death events to the server-logs Discord channel
  player-events:
    log-joins: true
    log-quits: true
    log-deaths: true
